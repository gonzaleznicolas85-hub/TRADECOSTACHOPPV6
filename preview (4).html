<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Marketing Chopp Costa - Comodatos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --brand: #003366;
      --brand-2: #0f4c81;
      --bg: #eef2f7;
      --card: #ffffff;
      --muted: #6b7280;
      --border: #d1d5db;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
    }

    .section-card {
      background: var(--card);
      border: 1px solid #dbe3ec;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    .section-title {
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      color: white;
      border-radius: 14px 14px 0 0;
    }

    .field-label {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.35rem;
    }

    .field-input,
    .field-select,
    .field-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.78rem 0.85rem;
      font-size: 0.95rem;
      outline: none;
      background: white;
      box-sizing: border-box;
    }

    .field-input:focus,
    .field-select:focus,
    .field-textarea:focus {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.12);
    }

    .field-textarea {
      min-height: 110px;
      resize: vertical;
    }

    .readonly {
      background: #f3f4f6;
      color: #374151;
      font-weight: 700;
    }

    .qty-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    @media (min-width: 768px) {
      .qty-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .submit-btn {
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 1rem 1.2rem;
      width: 100%;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .submit-btn:hover {
      background: #00264d;
    }

    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .secondary-btn {
      border: 1px solid #cbd5e1;
      background: white;
      color: #111827;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .status-box {
      border-radius: 14px;
      padding: 1rem;
      display: none;
    }

    .status-ok {
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #065f46;
    }

    .status-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="max-w-6xl mx-auto px-4 py-6 md:py-8">
    <div class="mb-6">
      <div class="section-card overflow-hidden">
        <div class="section-title px-5 py-4">
          <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">
            Trade Marketing Chopp Costa
          </h1>
          <p class="mt-1 text-sm md:text-base text-blue-100">
            Sistema digital de gestión de comodatos
          </p>
        </div>
        <div class="px-5 py-4 bg-white">
          <p class="text-sm text-gray-600">
            Versión con numeración automática de comodato.
          </p>
        </div>
      </div>
    </div>

    <div id="statusBox" class="status-box mb-5"></div>

    <form id="comodatoForm" class="space-y-6">
      <section class="section-card overflow-hidden">
        <div class="section-title px-5 py-4">
          <h2 class="text-lg md:text-xl font-bold">1. Logística</h2>
        </div>

        <div class="p-4 md:p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label" for="fecha">Fecha</label>
            <input id="fecha" name="fecha" type="date" class="field-input" required />
          </div>

          <div>
            <label class="field-label" for="comodatoNumero">Comodato N°</label>
            <div class="flex gap-2">
              <input id="comodatoNumero" name="comodatoNumero" type="text" class="field-input readonly" value="Cargando..." readonly />
              <button type="button" id="refreshNumberBtn" class="secondary-btn">Actualizar</button>
            </div>
          </div>

          <div>
            <label class="field-label" for="tecnico">Técnico</label>
            <input id="tecnico" name="tecnico" type="text" class="field-input" required />
          </div>

          <div>
            <label class="field-label" for="distribuidor">Distribuidor</label>
            <select id="distribuidor" name="distribuidor" class="field-select" required>
              <option value="">Seleccionar...</option>
              <option>BEBIDAS CENTRO S.A.</option>
              <option>BEBIDAS DEL MAR S.A.</option>
              <option>BEER TAN S.A.</option>
              <option>CLOMAR LOGISTICS S.A.</option>
              <option>COMERCIAL DE LOS ARROYOS S.A.</option>
              <option>COMERCIAL DEL MAR SA</option>
              <option>DEL PALACIO S.A.</option>
              <option>GALUPO S.A.</option>
              <option>GRUPO PEREZ SRL</option>
              <option>NECOCHEA PAMPA ALTA S.A.</option>
              <option>P D B SRL</option>
              <option>PAGANI RUBEN OSVALDO</option>
              <option>PUERTA DEL SUR S.A.</option>
              <option>VALPARAISO EMB. S.A</option>
            </select>
          </div>

          <div>
            <label class="field-label" for="codCliente">Cod. Cliente</label>
            <input id="codCliente" name="codCliente" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="cuit">CUIT</label>
            <input id="cuit" name="cuit" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="nombreFantasia">Nombre Fantasía</label>
            <input id="nombreFantasia" name="nombreFantasia" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="razonSocial">Razón Social</label>
            <input id="razonSocial" name="razonSocial" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="domicilio">Domicilio</label>
            <input id="domicilio" name="domicilio" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="localidad">Localidad</label>
            <input id="localidad" name="localidad" type="text" class="field-input" />
          </div>
        </div>
      </section>

      <section class="section-card overflow-hidden">
        <div class="section-title px-5 py-4">
          <h2 class="text-lg md:text-xl font-bold">2. Equipo</h2>
        </div>

        <div class="p-4 md:p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label" for="marca">Marca</label>
            <input id="marca" name="marca" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="modelo">Modelo</label>
            <input id="modelo" name="modelo" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="activoFijo">Activo Fijo</label>
            <input id="activoFijo" name="activoFijo" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="serie">Serie</label>
            <input id="serie" name="serie" type="text" class="field-input" />
          </div>
        </div>
      </section>

      <section class="section-card overflow-hidden">
        <div class="section-title px-5 py-4">
          <h2 class="text-lg md:text-xl font-bold">3. Materiales (Cantidades)</h2>
        </div>

        <div class="p-4 md:p-5 qty-grid">
          <div><label class="field-label" for="regCornelius">Reg. Cornelius</label><input id="regCornelius" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="regMafridis">Reg. Mafridis</label><input id="regMafridis" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="llaveMixta">Llave Mixta</label><input id="llaveMixta" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="cabezalMM">Cabezal MM</label><input id="cabezalMM" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="mangueraCerveza">Manguera Cerveza</label><input id="mangueraCerveza" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="mangueraPython">Manguera Python</label><input id="mangueraPython" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="canillaNiquelada">Canilla Niquelada</label><input id="canillaNiquelada" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="canillaAgua">Canilla Agua</label><input id="canillaAgua" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="transformador">Transformador</label><input id="transformador" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="separadoresCanilla">Separadores Canilla</label><input id="separadoresCanilla" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="conectorVasera">Conector Vasera</label><input id="conectorVasera" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="cantPicos">Cant. Picos</label><input id="cantPicos" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="medallones">Medallones</label><input id="medallones" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="tuboGas">Tubo Gas</label><input id="tuboGas" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="vaseraRinser">Vasera Rinser</label><input id="vaseraRinser" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="rinser">Rinser</label><input id="rinser" type="number" min="0" value="0" class="field-input" /></div>
          <div><label class="field-label" for="mangueraDesague">Manguera Desagüe</label><input id="mangueraDesague" type="number" min="0" value="0" class="field-input" /></div>
        </div>
      </section>

      <section class="section-card overflow-hidden">
        <div class="section-title px-5 py-4">
          <h2 class="text-lg md:text-xl font-bold">4. Especiales</h2>
        </div>

        <div class="p-4 md:p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label" for="handle">Handle</label>
            <input id="handle" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="celli">Celli</label>
            <select id="celli" class="field-select">
              <option value="">Seleccionar...</option>
              <option>DORADA</option>
              <option>NIQUELADA</option>
            </select>
          </div>

          <div>
            <label class="field-label" for="vasera">Vasera</label>
            <select id="vasera" class="field-select">
              <option value="">Seleccionar...</option>
              <option>Cervecera</option>
            </select>
          </div>

          <div>
            <label class="field-label" for="pilon">Pilon</label>
            <select id="pilon" class="field-select">
              <option value="">Seleccionar...</option>
              <option>BRAHAUS 3 VIAS</option>
              <option>BRAHAUS 4 VIAS</option>
              <option>BRAHAUS 6 VIAS</option>
              <option>EOS 3 VIAS</option>
              <option>EOS 1 VIA</option>
              <option>HAVANNA</option>
              <option>MAGIC</option>
              <option>ROMANTIC</option>
              <option>AZUR</option>
              <option>CUELLO CISNE</option>
              <option>CERAMICO</option>
              <option>OTROS</option>
            </select>
          </div>

          <div id="pilonOtrosWrap" class="md:col-span-2 hidden">
            <label class="field-label" for="pilonOtros">Pilon - Otros</label>
            <input id="pilonOtros" type="text" class="field-input" />
          </div>

          <div>
            <label class="field-label" for="cabezal">Cabezal</label>
            <input id="cabezal" type="text" class="field-input" />
          </div>

          <div class="md:col-span-2">
            <label class="field-label" for="descripcion">Descripción</label>
            <textarea id="descripcion" class="field-textarea"></textarea>
          </div>
        </div>
      </section>

      <section class="section-card overflow-hidden">
        <div class="section-title px-5 py-4">
          <h2 class="text-lg md:text-xl font-bold">5. Cierre</h2>
        </div>

        <div class="p-4 md:p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="field-label" for="aclaracion">Aclaración</label>
            <input id="aclaracion" type="text" class="field-input" required />
          </div>

          <div>
            <label class="field-label" for="dni">DNI</label>
            <input id="dni" type="text" class="field-input" required />
          </div>
        </div>
      </section>

      <div>
        <button id="submitBtn" type="submit" class="submit-btn">
          Guardar comodato en Google Sheets
        </button>
      </div>
    </form>
  </div>

  <script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFcNsPIMtdUd19hsKHlhuyxLw_0vmXJ8zPnj87EyPqIDLyKkcpnQuoeVOsoLCl2nra/exec";

    const form = document.getElementById("comodatoForm");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("statusBox");
    const pilonSelect = document.getElementById("pilon");
    const pilonOtrosWrap = document.getElementById("pilonOtrosWrap");
    const pilonOtrosInput = document.getElementById("pilonOtros");

    function showStatus(message, isError = false) {
      statusBox.style.display = "block";
      statusBox.className = "status-box mb-5 " + (isError ? "status-error" : "status-ok");
      statusBox.textContent = message;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function hideStatus() {
      statusBox.style.display = "none";
      statusBox.textContent = "";
    }

    function setToday() {
      const fechaInput = document.getElementById("fecha");
      const today = new Date();
      const offset = today.getTimezoneOffset();
      const localDate = new Date(today.getTime() - offset * 60000).toISOString().split("T")[0];
      fechaInput.value = localDate;
    }

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function numberValue(id) {
      const raw = document.getElementById(id).value;
      const n = Number(raw);
      return Number.isNaN(n) ? 0 : n;
    }

    function getPayload() {
      return {
        fecha: value("fecha"),
        tecnico: value("tecnico"),
        distribuidor: value("distribuidor"),
        codCliente: value("codCliente"),
        cuit: value("cuit"),
        nombreFantasia: value("nombreFantasia"),
        razonSocial: value("razonSocial"),
        domicilio: value("domicilio"),
        localidad: value("localidad"),

        marca: value("marca"),
        modelo: value("modelo"),
        activoFijo: value("activoFijo"),
        serie: value("serie"),

        regCornelius: numberValue("regCornelius"),
        regMafridis: numberValue("regMafridis"),
        llaveMixta: numberValue("llaveMixta"),
        cabezalMM: numberValue("cabezalMM"),
        mangueraCerveza: numberValue("mangueraCerveza"),
        mangueraPython: numberValue("mangueraPython"),
        canillaNiquelada: numberValue("canillaNiquelada"),
        canillaAgua: numberValue("canillaAgua"),
        transformador: numberValue("transformador"),
        separadoresCanilla: numberValue("separadoresCanilla"),
        conectorVasera: numberValue("conectorVasera"),
        cantPicos: numberValue("cantPicos"),
        medallones: numberValue("medallones"),
        tuboGas: numberValue("tuboGas"),
        vaseraRinser: numberValue("vaseraRinser"),
        rinser: numberValue("rinser"),
        mangueraDesague: numberValue("mangueraDesague"),

        handle: value("handle"),
        celli: value("celli"),
        vasera: value("vasera"),
        pilon: value("pilon"),
        pilonOtros: value("pilonOtros"),
        cabezal: value("cabezal"),
        descripcion: value("descripcion"),

        aclaracion: value("aclaracion"),
        dni: value("dni")
      };
    }

    function validateBeforeSend(payload) {
      if (!payload.fecha) return "La fecha es obligatoria.";
      if (!payload.tecnico) return "El técnico es obligatorio.";
      if (!payload.distribuidor) return "El distribuidor es obligatorio.";
      if (!payload.aclaracion) return "La aclaración es obligatoria.";
      if (!payload.dni) return "El DNI es obligatorio.";
      if (payload.pilon === "OTROS" && !payload.pilonOtros) return "Debés completar Pilon - Otros.";
      return "";
    }

    pilonSelect.addEventListener("change", function () {
      const isOtros = pilonSelect.value === "OTROS";
      pilonOtrosWrap.classList.toggle("hidden", !isOtros);
      if (!isOtros) pilonOtrosInput.value = "";
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      hideStatus();

      const payload = getPayload();
      const validationMessage = validateBeforeSend(payload);

      if (validationMessage) {
        showStatus(validationMessage, true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Guardando...";

      try {
        const response = await fetch(APP_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!result.ok) {
          throw new Error(result.message || "No se pudo guardar.");
        }

        showStatus("Comodato guardado correctamente en Google Sheets.");
        form.reset();
        setToday();
        document.getElementById("comodatoNumero").value = "TCC-PENDIENTE";
        pilonOtrosWrap.classList.add("hidden");
      } catch (error) {
        showStatus("Error al guardar: " + error.message, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Guardar comodato en Google Sheets";
      }
    });

    setToday();
  </script>
</body>
</html>
